<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ラインストーン購入プランナー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f4f0fa;
      color: #333;
      min-height: 100vh;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 16px 14px 48px; }
    h1 { text-align: center; font-size: 17px; padding: 18px 0 14px; color: #6b4fa0; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(107,79,160,0.08);
    }
    .section-title {
      font-size: 12px; color: #999; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px;
    }

    /* ── 色追加エリア ── */
    .add-color-row { display: flex; gap: 8px; }
    .add-color-row input {
      flex: 1; padding: 11px 14px;
      border: 2px solid #e0d6f0; border-radius: 10px;
      font-size: 15px; outline: none; transition: border-color 0.15s;
    }
    .add-color-row input:focus { border-color: #6b4fa0; }
    .add-color-btn {
      padding: 11px 18px;
      background: #6b4fa0; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .add-color-btn:active { background: #5a3e8a; }

    /* ── 色カード ── */
    .color-card {
      background: #fff;
      border: 2px solid #d4c4f0;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(107,79,160,0.07);
    }
    .color-card-header {
      display: flex; align-items: center;
      margin-bottom: 12px;
    }
    .color-card-name {
      flex: 1;
      font-size: 16px; font-weight: 800; color: #5a3e8a;
    }
    .remove-color-btn {
      background: none; border: none;
      color: #bbb; font-size: 22px; cursor: pointer;
      padding: 0 4px; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .remove-color-btn:active { color: #e74c3c; }

    /* ── サイズ行（カード内） ── */
    .size-row {
      display: flex; align-items: center; padding: 11px 0;
      border-bottom: 1px solid #f2eef8;
    }
    .size-row:last-child { border-bottom: none; }
    .size-checkbox { width: 22px; height: 22px; accent-color: #6b4fa0; cursor: pointer; flex-shrink: 0; }
    .size-label { flex: 1; margin-left: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .qty-control {
      display: flex; align-items: center; gap: 6px;
      opacity: 0.25; pointer-events: none; transition: opacity 0.2s;
    }
    .qty-control.active { opacity: 1; pointer-events: auto; }
    .qty-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #6b4fa0; background: #fff; color: #6b4fa0;
      font-size: 19px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; user-select: none; line-height: 1;
    }
    .qty-btn:active { background: #f0eaff; }
    .qty-input {
      width: 36px; text-align: center; font-size: 16px; font-weight: 700;
      border: none; outline: none; background: transparent;
    }
    .qty-unit { font-size: 12px; color: #999; }

    /* ── 検索ボタン ── */
    .search-btn {
      width: 100%; padding: 16px;
      background: #6b4fa0; color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      cursor: pointer; margin-bottom: 20px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
    }
    .search-btn:disabled { background: #ccc; cursor: default; }
    .search-btn:not(:disabled):active { background: #5a3e8a; transform: scale(0.98); }

    /* ── ローディング ── */
    .loading { text-align: center; padding: 36px 0; color: #999; font-size: 15px; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e8e0f5; border-top-color: #6b4fa0;
      border-radius: 50%; animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 結果 ── */
    .result-color-title {
      font-size: 16px; font-weight: 800; color: #6b4fa0; margin-bottom: 10px;
    }
    .result-size-title {
      font-size: 13px; font-weight: 700; color: #999;
      margin: 14px 0 8px; text-transform: uppercase;
    }
    .result-size-title:first-of-type { margin-top: 0; }

    .site-card {
      border: 1.5px solid #e8e0f5; border-radius: 14px;
      padding: 13px 14px; margin-bottom: 10px; background: #fdfbff;
    }
    .site-card.best { border-color: #6b4fa0; border-width: 2px; background: #faf7ff; }
    .badge-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .best-badge {
      background: #6b4fa0; color: #fff;
      font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px;
    }
    .coupon-badge {
      background: #27ae60; color: #fff;
      font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px;
    }
    .site-name { font-size: 13px; color: #888; margin-bottom: 2px; }
    .site-total { font-size: 22px; font-weight: 800; color: #222; line-height: 1.2; }
    .site-breakdown { font-size: 13px; color: #888; margin-bottom: 8px; }
    .shipping-free { color: #27ae60; font-weight: 600; font-size: 13px; margin-bottom: 8px; }
    .shipping-cost { font-size: 13px; color: #e08000; margin-bottom: 8px; line-height: 1.5; }
    .buy-btn {
      display: block; width: 100%; padding: 11px;
      background: #6b4fa0; color: #fff;
      text-align: center; text-decoration: none;
      border-radius: 10px; font-size: 15px; font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }
    .buy-btn:active { background: #5a3e8a; }
    .all-no-stock { color: #e74c3c; font-size: 14px; padding: 6px 0; }
    .no-stock-note { font-size: 12px; color: #bbb; margin-top: 4px; }
    .error-msg { color: #e74c3c; font-size: 14px; }

    .empty-hint {
      text-align: center; color: #bbb; font-size: 14px; padding: 8px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>💎 ラインストーン購入プランナー</h1>

  <!-- 色追加 -->
  <div class="card">
    <div class="section-title">色を追加</div>
    <div class="add-color-row">
      <input type="text" id="colorInput" placeholder="例: ジェット"
             onkeydown="if(event.key==='Enter') addColor()">
      <button class="add-color-btn" onclick="addColor()">追加</button>
    </div>
  </div>

  <!-- 色カード一覧 -->
  <div id="colorCards">
    <p class="empty-hint">↑ 色を追加してください</p>
  </div>

  <button class="search-btn" id="searchBtn" onclick="doSearch()" disabled>
    検索する
  </button>

  <div id="results"></div>
</div>

<script>
  const SIZES = {{ sizes | tojson }};
  let colorList = []; // [{color, id}]
  let nextId = 0;

  function addColor() {
    const input = document.getElementById('colorInput');
    const val = input.value.trim();
    if (!val) return;
    // カンマ区切り一括入力対応
    const names = val.split(/[,、，]/).map(s => s.trim()).filter(Boolean);
    names.forEach(name => {
      if (!colorList.find(c => c.color === name)) {
        colorList.push({ color: name, id: nextId++ });
      }
    });
    input.value = '';
    renderColorCards();
    updateBtn();
  }

  function removeColor(id) {
    colorList = colorList.filter(c => c.id !== id);
    renderColorCards();
    updateBtn();
  }

  function renderColorCards() {
    const container = document.getElementById('colorCards');
    if (colorList.length === 0) {
      container.innerHTML = '<p class="empty-hint">↑ 色を追加してください</p>';
      return;
    }
    container.innerHTML = colorList.map(({ color, id }) => `
      <div class="color-card" id="card_${id}">
        <div class="color-card-header">
          <div class="color-card-name">🎨 ${color}</div>
          <button class="remove-color-btn" onclick="removeColor(${id})">×</button>
        </div>
        ${SIZES.map(size => `
        <div class="size-row">
          <input type="checkbox" class="size-checkbox" id="chk_${id}_${size}"
                 onchange="toggleSize(${id}, '${size}', this.checked)">
          <label class="size-label" for="chk_${id}_${size}">${size}</label>
          <div class="qty-control" id="qty_${id}_${size}">
            <button class="qty-btn" onclick="changeQty(${id}, '${size}', -1)">−</button>
            <input class="qty-input" id="qtyInput_${id}_${size}" value="1" readonly>
            <span class="qty-unit">パック</span>
            <button class="qty-btn" onclick="changeQty(${id}, '${size}', +1)">＋</button>
          </div>
        </div>`).join('')}
      </div>
    `).join('');
  }

  function toggleSize(id, size, checked) {
    document.getElementById(`qty_${id}_${size}`).classList.toggle('active', checked);
    updateBtn();
  }

  function changeQty(id, size, delta) {
    const input = document.getElementById(`qtyInput_${id}_${size}`);
    const v = parseInt(input.value) + delta;
    if (v >= 1 && v <= 99) input.value = v;
  }

  function updateBtn() {
    const hasColor = colorList.length > 0;
    const hasSize = colorList.some(({ id }) =>
      SIZES.some(size => {
        const chk = document.getElementById(`chk_${id}_${size}`);
        return chk && chk.checked;
      })
    );
    document.getElementById('searchBtn').disabled = !(hasColor && hasSize);
  }

  function doSearch() {
    const requests = colorList.map(({ color, id }) => {
      const items = SIZES
        .filter(size => document.getElementById(`chk_${id}_${size}`)?.checked)
        .map(size => ({
          size,
          packs: parseInt(document.getElementById(`qtyInput_${id}_${size}`).value)
        }));
      return { color, items };
    }).filter(r => r.items.length > 0);

    if (requests.length === 0) return;

    document.getElementById('results').innerHTML =
      '<div class="loading"><div class="spinner"></div>検索中です…</div>';
    document.getElementById('searchBtn').disabled = true;

    fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests })
    })
    .then(r => r.json())
    .then(showResults)
    .catch(() => {
      document.getElementById('results').innerHTML =
        '<div class="card"><p class="error-msg">エラーが発生しました。もう一度お試しください。</p></div>';
    })
    .finally(() => {
      document.getElementById('searchBtn').disabled = false;
    });
  }

  function fmt(n) { return Number(n).toLocaleString('ja-JP'); }

  function showResults(data) {
    if (!data || data.error) {
      document.getElementById('results').innerHTML =
        `<div class="card"><p class="error-msg">${data?.error || '結果がありませんでした'}</p></div>`;
      return;
    }
    let html = '';
    data.forEach(colorGroup => {
      html += `<div class="card">`;
      html += `<div class="result-color-title">🎨 ${colorGroup.color}</div>`;
      colorGroup.sizes.forEach((d, idx) => {
        html += `<div class="result-size-title">${d.size} × ${d.packs}パック</div>`;
        if (d.available.length === 0) {
          html += `<p class="all-no-stock">❌ 全サイト在庫なし</p>`;
        } else {
          d.available.forEach((r, i) => {
            const isBest = i === 0;
            html += `<div class="site-card${isBest ? ' best' : ''}">`;
            let badges = '';
            if (isBest) badges += `<span class="best-badge">最安</span>`;
            if (r.coupon_applied) badges += `<span class="coupon-badge">クーポン5%OFF</span>`;
            if (badges) html += `<div class="badge-row">${badges}</div>`;
            html += `<div class="site-name">${r.site}</div>`;
            html += `<div class="site-total">¥${fmt(r.total)}</div>`;
            html += `<div class="site-breakdown">¥${fmt(r.price)} × ${d.packs}パック`;
            if (r.shipping > 0) html += ` + 送料¥${fmt(r.shipping)}`;
            html += `</div>`;
            if (r.shipping === 0) {
              html += `<div class="shipping-free">✅ 送料無料</div>`;
            } else {
              html += `<div class="shipping-cost">⚠️ 送料 ¥${fmt(r.shipping)} かかります<br>あと ¥${fmt(r.free_shortage)} で送料無料！</div>`;
            }
            html += `<a href="${r.url}" class="buy-btn" target="_blank">このサイトで購入する →</a>`;
            html += `</div>`;
          });
        }
        const noStockNames = d.unavailable
          .filter(r => r.note !== 'このサイズは取り扱いなし')
          .map(r => r.site).join('、');
        if (noStockNames) html += `<div class="no-stock-note">在庫なし: ${noStockNames}</div>`;
      });
      html += `</div>`;
    });
    document.getElementById('results').innerHTML = html;
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
